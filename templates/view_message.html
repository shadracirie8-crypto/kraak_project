<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails du Message</title>
    <!-- Tailwind CSS via CDN pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-100">

<div class="min-h-screen flex items-center justify-center p-4">
    <!-- La Boîte de Dialogue -->
    <div class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-white">
        
        <!-- Header avec dégradé -->
        <div class="bg-gradient-to-r from-cyan-600 to-blue-600 px-8 py-10 text-white relative">
            <div class="relative z-10">
                <h2 class="text-3xl font-extrabold tracking-tight">Message de {{ msg.name }}</h2>
                <p class="text-cyan-100 mt-2 flex items-center text-sm">
                    <i data-lucide="calendar" class="w-4 h-4 mr-2"></i>
                    Reçu le {{ msg.created_at|date:"d F Y" }} à {{ msg.created_at|date:"H:i" }}
                </p>
            </div>
            <!-- Icône décorative en fond -->
            <i data-lucide="mail" class="absolute right-6 bottom-4 w-24 h-24 text-white/10 -rotate-12"></i>
        </div>

        <!-- Contenu -->
        <div class="p-8">
            <div class="flex flex-wrap gap-4 mb-8">
                <div class="flex-1 min-w-[200px] bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Email de contact</span>
                    <a href="mailto:{{ msg.email }}" class="block text-cyan-600 font-semibold truncate hover:text-cyan-700">
                        {{ msg.email }}
                    </a>
                </div>
                <div class="flex-1 min-w-[200px] bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Sujet du message</span>
                    <span class="block text-gray-800 font-semibold truncate">
                        {{ msg.subject|default:"Sans objet" }}
                    </span>
                </div>
            </div>

            <div class="relative">
                <i data-lucide="quote-positive" class="absolute -top-2 -left-2 w-8 h-8 text-cyan-100"></i>
                <div class="pl-6 border-l-4 border-cyan-500">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Contenu</label>
                    <p class="text-gray-700 leading-relaxed text-lg whitespace-pre-line italic">
                        "{{ msg.message }}"
                    </p>
                </div>
            </div>
        </div>

        <!-- Action -->
        <div class="px-8 py-6 bg-gray-50 border-t border-gray-100 flex justify-center">
            <a href="{% url 'admin_dashboard' %}" 
               class="group flex items-center px-8 py-3 bg-gray-900 text-white rounded-full font-bold hover:bg-gray-800 transition-all hover:scale-105 shadow-lg">
                <i data-lucide="arrow-left" class="w-5 h-5 mr-2 group-hover:-translate-x-1 transition-transform"></i>
                Retour au tableau de bord
            </a>
        </div>
    </div>
</div>

<script>
    // Initialisation des icônes
    lucide.createIcons();
</script>

</body>
</html>
