{% load static %}
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Kraak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/" class="inline-block text-3xl font-bold text-cyan-600 tracking-tight mb-2">KRAAK</a>
            <h1 class="text-xl font-semibold text-slate-900">Bon retour !</h1>
            <p class="text-slate-500 text-sm">Connectez-vous pour accéder à votre espace.</p>
        </div>

        <!-- Carte Formulaire -->
        <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
            <div class="p-8">
                <form method="post" class="space-y-5">
                    {% csrf_token %}
                    
                    {% if form.errors %}
                    <div class="p-4 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm rounded-r-lg mb-4">
                        <p class="font-bold">Identifiants incorrects</p>
                        <p>Veuillez vérifier votre nom d'utilisateur et votre mot de passe.</p>
                    </div>
                    {% endif %}

                    <!-- Nom d'utilisateur -->
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Nom d'utilisateur</label>
                        <div class="relative">
                            <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-300"></i>
                            <input type="text" name="username" required
                                   class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-all outline-none"
                                   placeholder="Votre pseudo">
                        </div>
                    </div>

                    <!-- Mot de passe -->
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Mot de passe</label>
                            <a href="#" class="text-[10px] text-cyan-600 hover:underline">Oublié ?</a>
                        </div>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-300"></i>
                            <input type="password" name="password" required
                                   class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-all outline-none"
                                   placeholder="••••••••">
                        </div>
                    </div>

                    <!-- Bouton Submit -->
                    <button type="submit" 
                            class="w-full bg-cyan-600 text-white font-bold py-4 rounded-2xl hover:bg-cyan-700 hover:shadow-lg hover:shadow-cyan-200 transition-all active:scale-[0.98] flex items-center justify-center">
                        Se connecter
                        <i data-lucide="log-in" class="w-5 h-5 ml-2"></i>
                    </button>
                </form>
            </div>

            <!-- Footer Card -->
            <div class="bg-slate-50 p-6 border-t border-slate-100 text-center">
                <p class="text-slate-500 text-sm">
                    Nouveau ici ? 
                    <a href="{% url 'signup' %}" class="text-cyan-600 font-bold hover:underline ml-1">Créer un compte</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
