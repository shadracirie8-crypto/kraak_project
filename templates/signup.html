<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | Kraak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <a href="/" class="text-3xl font-bold text-cyan-600 tracking-tight">KRAAK</a>
            <h1 class="text-xl font-semibold text-slate-900 mt-2">Créer un compte</h1>
            <p class="text-slate-500 text-sm">Rejoignez-nous pour commencer votre aventure.</p>
        </div>

        <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 p-8">
            <form method="post" class="space-y-4">
                {% csrf_token %}
                
                {% if form.errors %}
                <div class="p-4 bg-red-50 text-red-700 text-xs rounded-xl border border-red-100">
                    {{ form.errors }}
                </div>
                {% endif %}

                {% for field in form %}
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 px-1">
                        {{ field.label }}
                    </label>
                    <div class="relative">
                        <!-- On laisse Django générer l'input mais on peut le styliser via CSS ou des widgets -->
                        {{ field }}
                    </div>
                    {% if field.help_text %}
                    <p class="text-[10px] text-slate-400 mt-1 px-1">{{ field.help_text }}</p>
                    {% endif %}
                </div>
                {% endfor %}

                <button type="submit" 
                        class="w-full bg-cyan-600 text-white font-bold py-4 rounded-2xl hover:bg-cyan-700 transition-all active:scale-[0.98] shadow-lg shadow-cyan-100 mt-4">
                    S'inscrire maintenant
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-50 text-center">
                <p class="text-slate-500 text-sm">
                    Déjà membre ? 
                    <a href="{% url 'login' %}" class="text-cyan-600 font-bold hover:underline">Se connecter</a>
                </p>
            </div>
        </div>
    </div>

    <style>
        /* Stylisation rapide des inputs générés par Django */
        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            outline: none;
            transition: all 0.2s;
        }
        input:focus {
            ring: 2px;
            border-color: #0891b2;
            box-shadow: 0 0 0 2px rgba(8, 145, 178, 0.1);
        }
    </style>
</body>
</html>
